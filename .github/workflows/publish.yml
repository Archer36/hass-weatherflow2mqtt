name: publish

on:
  workflow_dispatch: 
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
      - '**/CHANGELOG.md'
      - '**/config_example.yaml'


jobs:
  publish-weatherflow2mqtt-image:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build the WeatherFlow2MQTT Docker image
      run: |
        VERSION=$(cat VERSION)
        echo VERSION=$VERSION
        
        docker build . --tag ghcr.io/${{ github.repository_owner }}/hass-weatherflow2mqtt:latest --tag ghcr.io/${{ github.repository_owner }}/hass-weatherflow2mqtt:$VERSION
        docker push ghcr.io/${{ github.repository_owner }}/hass-weatherflow2mqtt:$VERSION
        docker push ghcr.io/${{ github.repository_owner }}/hass-weatherflow2mqtt:latest
